
<!-- Html5 document -->
<!DOCTYPE html>
<!-- Written for SEO and tell for screen reader that this is an english document -->
<html lang="en">

<!-- Head contains meta data -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLabs UI</title>

    <!-- href stands for Hypertext Reference, rel = type of relationship -->

    <link rel="stylesheet" href="style.css">
</head>


<!-- Contains all the text and html tags which gets displayed on our webpage -->
<body>
    <!-- NAVBAR -->
    <div class="navbar">
        <h2 class="logo">DevLabs</h2>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Courses</a>
            <a href="#">Contact</a>
        </div>
    </div>

    

    <!-- MAIN SECTION -->
    <div class="container">

        <h1 class="title">Learn Web Development</h1>

        <p class="subtitle">
            Build real websites using HTML and CSS
        </p>

        <!-- SEARCH BOX -->
        <div class="search-box">
            <input type="text" placeholder="Search anything...">
        </div>

        <!-- BUTTONS -->
        <div class="buttons">
            <button class="btn primary">Search</button>
            <button class="btn secondary">I'm Feeling Lucky</button>
        </div>

    </div>



    <!-- FOOTER -->
    <div class="footer">
        <p>© 2026 DevLabs</p>
    </div>

</body>
</html>
